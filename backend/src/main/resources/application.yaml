server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  gcs:
    bucket: ${GCS_BUCKET:}
    signed-url-duration-minutes: ${GCS_SIGNED_URL_DURATION_MINUTES:15}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/app}
    username: ${DB_USER:app}
    password: ${DB_PASS:app}
  flyway:
    enabled: true
    # migrate用ユーザー（未設定なら datasource を使う）
    url: ${FLYWAY_URL:${DB_URL}}
    user: ${FLYWAY_USER:${DB_USER}}
    password: ${FLYWAY_PASS:${DB_PASS}}
    # 初回からFlyway管理したいなら true が便利
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate # ← updateは使わない
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info
