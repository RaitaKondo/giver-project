services:
  api:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      # コンテナ内からは db というサービス名で到達
      DB_URL: jdbc:postgresql://db:5432/app
      DB_USER: app
      DB_PASS: app
      # Firebase Admin が Secret Manager を読むための GCP 認証情報。
      FIREBASE_PROJECT_ID: giver-488205
      FIREBASE_SERVICE_ACCOUNT_SECRET_NAME: firebase-service-account
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-adc.json
    depends_on:
      - db
    volumes:
      # `gcloud auth application-default login` で生成される ADC を読み込む。
      - ${USERPROFILE}\AppData\Roaming\gcloud\application_default_credentials.json:/secrets/gcp-adc.json:ro

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "15432:5432"   # ← ホストPC:5432 → dbコンテナ:5432
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
